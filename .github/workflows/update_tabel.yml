name: Scrape Tabel BPS Kota Jogja

on:
  schedule:
    - cron: '0 0 1 * *'  # Otomatis tiap tanggal 1 setiap bulan
  workflow_dispatch:       # Bisa trigger manual kapan saja

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Jalankan scraping
        run: python fetch_tabel.py

      - name: Commit & push hasil
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tabel_statistik.json
          git diff --cached --quiet || git commit -m "Auto-update tabel statistik BPS"
          git push
